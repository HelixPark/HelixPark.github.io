<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 460" width="760" height="460">
  <defs>
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#00000022"/>
    </filter>
  </defs>
  <rect width="760" height="460" fill="#f8f9fa" rx="12"/>
  <text x="380" y="36" text-anchor="middle" font-size="20" font-weight="bold" fill="#2c3e50" font-family="Arial, sans-serif">位置编码 (Positional Encoding)</text>

  <!-- Formula -->
  <rect x="100" y="52" width="560" height="60" rx="10" fill="#eaf2ff" stroke="#3498db" stroke-width="1.5"/>
  <text x="380" y="74" text-anchor="middle" font-size="13" fill="#2980b9" font-family="Arial, sans-serif">PE(pos, 2i)   = sin( pos / 10000^(2i/dmodel) )</text>
  <text x="380" y="100" text-anchor="middle" font-size="13" fill="#2980b9" font-family="Arial, sans-serif">PE(pos, 2i+1) = cos( pos / 10000^(2i/dmodel) )</text>

  <!-- Heatmap-like visualization -->
  <text x="380" y="145" text-anchor="middle" font-size="13" fill="#555" font-family="Arial, sans-serif">位置编码矩阵示意（行=位置，列=维度）</text>

  <!-- Grid cells -->
  <g transform="translate(80, 160)">
    <!-- Y axis label -->
    <text x="-10" y="100" text-anchor="middle" font-size="11" fill="#555" font-family="Arial, sans-serif" transform="rotate(-90,-10,100)">位置 (pos)</text>
    <!-- X axis label -->
    <text x="300" y="230" text-anchor="middle" font-size="11" fill="#555" font-family="Arial, sans-serif">维度 (dimension)</text>

    <!-- Row labels -->
    <text x="-5" y="20" text-anchor="end" font-size="10" fill="#555" font-family="Arial, sans-serif">0</text>
    <text x="-5" y="60" text-anchor="end" font-size="10" fill="#555" font-family="Arial, sans-serif">1</text>
    <text x="-5" y="100" text-anchor="end" font-size="10" fill="#555" font-family="Arial, sans-serif">2</text>
    <text x="-5" y="140" text-anchor="end" font-size="10" fill="#555" font-family="Arial, sans-serif">3</text>
    <text x="-5" y="180" text-anchor="end" font-size="10" fill="#555" font-family="Arial, sans-serif">4</text>

    <!-- Col labels -->
    <text x="20" y="215" text-anchor="middle" font-size="10" fill="#555" font-family="Arial, sans-serif">0</text>
    <text x="60" y="215" text-anchor="middle" font-size="10" fill="#555" font-family="Arial, sans-serif">1</text>
    <text x="100" y="215" text-anchor="middle" font-size="10" fill="#555" font-family="Arial, sans-serif">2</text>
    <text x="140" y="215" text-anchor="middle" font-size="10" fill="#555" font-family="Arial, sans-serif">3</text>
    <text x="180" y="215" text-anchor="middle" font-size="10" fill="#555" font-family="Arial, sans-serif">4</text>
    <text x="220" y="215" text-anchor="middle" font-size="10" fill="#555" font-family="Arial, sans-serif">5</text>
    <text x="260" y="215" text-anchor="middle" font-size="10" fill="#555" font-family="Arial, sans-serif">6</text>
    <text x="300" y="215" text-anchor="middle" font-size="10" fill="#555" font-family="Arial, sans-serif">7</text>

    <!-- Row 0: sin(0)=0, cos(0)=1, sin(0)=0, cos(0)=1 ... -->
    <rect x="0" y="0" width="40" height="40" fill="#7f8c8d" rx="2"/>
    <rect x="40" y="0" width="40" height="40" fill="#2ecc71" rx="2"/>
    <rect x="80" y="0" width="40" height="40" fill="#7f8c8d" rx="2"/>
    <rect x="120" y="0" width="40" height="40" fill="#2ecc71" rx="2"/>
    <rect x="160" y="0" width="40" height="40" fill="#7f8c8d" rx="2"/>
    <rect x="200" y="0" width="40" height="40" fill="#2ecc71" rx="2"/>
    <rect x="240" y="0" width="40" height="40" fill="#7f8c8d" rx="2"/>
    <rect x="280" y="0" width="40" height="40" fill="#2ecc71" rx="2"/>

    <!-- Row 1 -->
    <rect x="0" y="40" width="40" height="40" fill="#e74c3c" rx="2"/>
    <rect x="40" y="40" width="40" height="40" fill="#f39c12" rx="2"/>
    <rect x="80" y="40" width="40" height="40" fill="#3498db" rx="2"/>
    <rect x="120" y="40" width="40" height="40" fill="#1abc9c" rx="2"/>
    <rect x="160" y="40" width="40" height="40" fill="#9b59b6" rx="2"/>
    <rect x="200" y="40" width="40" height="40" fill="#2ecc71" rx="2"/>
    <rect x="240" y="40" width="40" height="40" fill="#e67e22" rx="2"/>
    <rect x="280" y="40" width="40" height="40" fill="#16a085" rx="2"/>

    <!-- Row 2 -->
    <rect x="0" y="80" width="40" height="40" fill="#c0392b" rx="2"/>
    <rect x="40" y="80" width="40" height="40" fill="#d35400" rx="2"/>
    <rect x="80" y="80" width="40" height="40" fill="#2980b9" rx="2"/>
    <rect x="120" y="80" width="40" height="40" fill="#27ae60" rx="2"/>
    <rect x="160" y="80" width="40" height="40" fill="#8e44ad" rx="2"/>
    <rect x="200" y="80" width="40" height="40" fill="#1abc9c" rx="2"/>
    <rect x="240" y="80" width="40" height="40" fill="#f39c12" rx="2"/>
    <rect x="280" y="80" width="40" height="40" fill="#3498db" rx="2"/>

    <!-- Row 3 -->
    <rect x="0" y="120" width="40" height="40" fill="#7f8c8d" rx="2"/>
    <rect x="40" y="120" width="40" height="40" fill="#e74c3c" rx="2"/>
    <rect x="80" y="120" width="40" height="40" fill="#2ecc71" rx="2"/>
    <rect x="120" y="120" width="40" height="40" fill="#9b59b6" rx="2"/>
    <rect x="160" y="120" width="40" height="40" fill="#3498db" rx="2"/>
    <rect x="200" y="120" width="40" height="40" fill="#e67e22" rx="2"/>
    <rect x="240" y="120" width="40" height="40" fill="#16a085" rx="2"/>
    <rect x="280" y="120" width="40" height="40" fill="#c0392b" rx="2"/>

    <!-- Row 4 -->
    <rect x="0" y="160" width="40" height="40" fill="#2ecc71" rx="2"/>
    <rect x="40" y="160" width="40" height="40" fill="#7f8c8d" rx="2"/>
    <rect x="80" y="160" width="40" height="40" fill="#e74c3c" rx="2"/>
    <rect x="120" y="160" width="40" height="40" fill="#3498db" rx="2"/>
    <rect x="160" y="160" width="40" height="40" fill="#f39c12" rx="2"/>
    <rect x="200" y="160" width="40" height="40" fill="#8e44ad" rx="2"/>
    <rect x="240" y="160" width="40" height="40" fill="#27ae60" rx="2"/>
    <rect x="280" y="160" width="40" height="40" fill="#d35400" rx="2"/>

    <!-- Value labels in cells -->
    <text x="20" y="25" text-anchor="middle" font-size="9" fill="white" font-family="Arial, sans-serif">0.00</text>
    <text x="60" y="25" text-anchor="middle" font-size="9" fill="white" font-family="Arial, sans-serif">1.00</text>
    <text x="100" y="25" text-anchor="middle" font-size="9" fill="white" font-family="Arial, sans-serif">0.00</text>
    <text x="140" y="25" text-anchor="middle" font-size="9" fill="white" font-family="Arial, sans-serif">1.00</text>
  </g>

  <!-- Legend -->
  <rect x="450" y="165" width="260" height="200" rx="10" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="580" y="188" text-anchor="middle" font-size="13" font-weight="bold" fill="#2c3e50" font-family="Arial, sans-serif">关键特性</text>
  <text x="470" y="215" font-size="11" fill="#555" font-family="Arial, sans-serif">✓ 每个位置有唯一的编码向量</text>
  <text x="470" y="238" font-size="11" fill="#555" font-family="Arial, sans-serif">✓ 偶数维度用 sin，奇数维度用 cos</text>
  <text x="470" y="261" font-size="11" fill="#555" font-family="Arial, sans-serif">✓ 不同频率捕获不同尺度的位置信息</text>
  <text x="470" y="284" font-size="11" fill="#555" font-family="Arial, sans-serif">✓ 可以推广到训练时未见过的序列长度</text>
  <text x="470" y="307" font-size="11" fill="#555" font-family="Arial, sans-serif">✓ 与词嵌入相加，注入位置信息</text>
  <text x="470" y="330" font-size="11" fill="#555" font-family="Arial, sans-serif">✓ 无需额外参数学习</text>

  <!-- Color scale -->
  <text x="80" y="400" font-size="11" fill="#555" font-family="Arial, sans-serif">颜色越深 → 值越大（接近 +1）</text>
  <text x="80" y="420" font-size="11" fill="#555" font-family="Arial, sans-serif">颜色越浅 → 值越小（接近 -1）</text>
</svg>
