<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 520" width="760" height="520">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#00000022"/>
    </filter>
  </defs>
  <rect width="760" height="520" fill="#f8f9fa" rx="12"/>
  <text x="380" y="36" text-anchor="middle" font-size="20" font-weight="bold" fill="#2c3e50" font-family="Arial, sans-serif">缩放点积注意力机制 (Scaled Dot-Product Attention)</text>

  <!-- Formula box -->
  <rect x="200" y="55" width="360" height="50" rx="10" fill="#eaf2ff" stroke="#3498db" stroke-width="1.5"/>
  <text x="380" y="76" text-anchor="middle" font-size="14" fill="#2980b9" font-family="Arial, sans-serif" font-style="italic">Attention(Q, K, V)</text>
  <text x="380" y="96" text-anchor="middle" font-size="14" fill="#2980b9" font-family="Arial, sans-serif">= softmax( QKᵀ / √dₖ ) · V</text>

  <!-- Q, K, V inputs -->
  <rect x="80" y="150" width="100" height="44" rx="8" fill="#e74c3c" filter="url(#shadow)"/>
  <text x="130" y="177" text-anchor="middle" font-size="16" font-weight="bold" fill="white" font-family="Arial, sans-serif">Q (查询)</text>

  <rect x="330" y="150" width="100" height="44" rx="8" fill="#2ecc71" filter="url(#shadow)"/>
  <text x="380" y="177" text-anchor="middle" font-size="16" font-weight="bold" fill="white" font-family="Arial, sans-serif">K (键)</text>

  <rect x="580" y="150" width="100" height="44" rx="8" fill="#3498db" filter="url(#shadow)"/>
  <text x="630" y="177" text-anchor="middle" font-size="16" font-weight="bold" fill="white" font-family="Arial, sans-serif">V (值)</text>

  <!-- MatMul QK -->
  <rect x="230" y="240" width="160" height="44" rx="8" fill="#8e44ad" filter="url(#shadow)"/>
  <text x="310" y="267" text-anchor="middle" font-size="13" fill="white" font-family="Arial, sans-serif">矩阵乘法 QKᵀ</text>

  <!-- Scale -->
  <rect x="230" y="320" width="160" height="44" rx="8" fill="#d35400" filter="url(#shadow)"/>
  <text x="310" y="347" text-anchor="middle" font-size="13" fill="white" font-family="Arial, sans-serif">缩放 ÷ √dₖ</text>

  <!-- Optional Mask -->
  <rect x="430" y="320" width="120" height="44" rx="8" fill="#7f8c8d" stroke="#bdc3c7" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="490" y="340" text-anchor="middle" font-size="12" fill="white" font-family="Arial, sans-serif">Mask (可选)</text>
  <text x="490" y="356" text-anchor="middle" font-size="10" fill="#ecf0f1" font-family="Arial, sans-serif">用于解码器</text>
  <line x1="430" y1="342" x2="394" y2="342" stroke="#7f8c8d" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow)"/>

  <!-- Softmax -->
  <rect x="230" y="400" width="160" height="44" rx="8" fill="#16a085" filter="url(#shadow)"/>
  <text x="310" y="427" text-anchor="middle" font-size="13" fill="white" font-family="Arial, sans-serif">Softmax</text>

  <!-- MatMul with V -->
  <rect x="230" y="460" width="160" height="44" rx="8" fill="#c0392b" filter="url(#shadow)"/>
  <text x="310" y="487" text-anchor="middle" font-size="13" fill="white" font-family="Arial, sans-serif">矩阵乘法 × V</text>

  <!-- Arrows -->
  <line x1="130" y1="194" x2="270" y2="240" stroke="#e74c3c" stroke-width="1.8" marker-end="url(#arrow)"/>
  <line x1="380" y1="194" x2="340" y2="240" stroke="#2ecc71" stroke-width="1.8" marker-end="url(#arrow)"/>
  <line x1="310" y1="284" x2="310" y2="320" stroke="#555" stroke-width="1.8" marker-end="url(#arrow)"/>
  <line x1="310" y1="364" x2="310" y2="400" stroke="#555" stroke-width="1.8" marker-end="url(#arrow)"/>
  <line x1="310" y1="444" x2="310" y2="460" stroke="#555" stroke-width="1.8" marker-end="url(#arrow)"/>

  <!-- V arrow to MatMul with V -->
  <line x1="630" y1="194" x2="630" y2="482" stroke="#3498db" stroke-width="1.8"/>
  <line x1="630" y1="482" x2="394" y2="482" stroke="#3498db" stroke-width="1.8" marker-end="url(#arrow)"/>

  <!-- Annotation boxes -->
  <rect x="30" y="260" width="80" height="30" rx="6" fill="#ffeaa7" stroke="#fdcb6e" stroke-width="1"/>
  <text x="70" y="280" text-anchor="middle" font-size="10" fill="#636e72" font-family="Arial, sans-serif">注意力分数</text>
  <line x1="110" y1="275" x2="230" y2="262" stroke="#fdcb6e" stroke-width="1" stroke-dasharray="3,2"/>

  <rect x="30" y="415" width="80" height="30" rx="6" fill="#ffeaa7" stroke="#fdcb6e" stroke-width="1"/>
  <text x="70" y="435" text-anchor="middle" font-size="10" fill="#636e72" font-family="Arial, sans-serif">注意力权重</text>
  <line x1="110" y1="430" x2="230" y2="422" stroke="#fdcb6e" stroke-width="1" stroke-dasharray="3,2"/>
</svg>
