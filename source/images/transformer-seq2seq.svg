<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 300" width="760" height="300">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#00000022"/>
    </filter>
  </defs>
  <rect width="760" height="300" fill="#f8f9fa" rx="12"/>
  <text x="380" y="34" text-anchor="middle" font-size="18" font-weight="bold" fill="#2c3e50" font-family="Arial, sans-serif">Transformer 翻译示例：英译中</text>

  <!-- Source tokens -->
  <text x="60" y="80" font-size="12" fill="#7f8c8d" font-family="Arial, sans-serif">输入序列：</text>
  <rect x="60" y="90" width="80" height="36" rx="7" fill="#3498db" filter="url(#shadow)"/>
  <text x="100" y="113" text-anchor="middle" font-size="13" fill="white" font-family="Arial, sans-serif">The</text>

  <rect x="150" y="90" width="80" height="36" rx="7" fill="#3498db" filter="url(#shadow)"/>
  <text x="190" y="113" text-anchor="middle" font-size="13" fill="white" font-family="Arial, sans-serif">cat</text>

  <rect x="240" y="90" width="80" height="36" rx="7" fill="#3498db" filter="url(#shadow)"/>
  <text x="280" y="113" text-anchor="middle" font-size="13" fill="white" font-family="Arial, sans-serif">sat</text>

  <rect x="330" y="90" width="80" height="36" rx="7" fill="#3498db" filter="url(#shadow)"/>
  <text x="370" y="113" text-anchor="middle" font-size="13" fill="white" font-family="Arial, sans-serif">on</text>

  <rect x="420" y="90" width="80" height="36" rx="7" fill="#3498db" filter="url(#shadow)"/>
  <text x="460" y="113" text-anchor="middle" font-size="13" fill="white" font-family="Arial, sans-serif">the</text>

  <rect x="510" y="90" width="80" height="36" rx="7" fill="#3498db" filter="url(#shadow)"/>
  <text x="550" y="113" text-anchor="middle" font-size="13" fill="white" font-family="Arial, sans-serif">mat</text>

  <!-- Transformer box -->
  <rect x="200" y="160" width="360" height="60" rx="12" fill="#2c3e50" filter="url(#shadow)"/>
  <text x="380" y="185" text-anchor="middle" font-size="16" font-weight="bold" fill="white" font-family="Arial, sans-serif">🤖 Transformer</text>
  <text x="380" y="208" text-anchor="middle" font-size="11" fill="#bdc3c7" font-family="Arial, sans-serif">编码器理解全局语义 → 解码器逐词生成</text>

  <!-- Arrows from source to transformer -->
  <line x1="300" y1="126" x2="300" y2="160" stroke="#3498db" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="460" y1="126" x2="420" y2="160" stroke="#3498db" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Target tokens -->
  <text x="60" y="255" font-size="12" fill="#7f8c8d" font-family="Arial, sans-serif">输出序列：</text>
  <rect x="60" y="262" width="80" height="36" rx="7" fill="#e74c3c" filter="url(#shadow)"/>
  <text x="100" y="285" text-anchor="middle" font-size="13" fill="white" font-family="Arial, sans-serif">猫</text>

  <rect x="150" y="262" width="80" height="36" rx="7" fill="#e74c3c" filter="url(#shadow)"/>
  <text x="190" y="285" text-anchor="middle" font-size="13" fill="white" font-family="Arial, sans-serif">坐</text>

  <rect x="240" y="262" width="80" height="36" rx="7" fill="#e74c3c" filter="url(#shadow)"/>
  <text x="280" y="285" text-anchor="middle" font-size="13" fill="white" font-family="Arial, sans-serif">在</text>

  <rect x="330" y="262" width="80" height="36" rx="7" fill="#e74c3c" filter="url(#shadow)"/>
  <text x="370" y="285" text-anchor="middle" font-size="13" fill="white" font-family="Arial, sans-serif">垫子</text>

  <rect x="420" y="262" width="80" height="36" rx="7" fill="#e74c3c" filter="url(#shadow)"/>
  <text x="460" y="285" text-anchor="middle" font-size="13" fill="white" font-family="Arial, sans-serif">上</text>

  <rect x="510" y="262" width="80" height="36" rx="7" fill="#27ae60" filter="url(#shadow)"/>
  <text x="550" y="285" text-anchor="middle" font-size="13" fill="white" font-family="Arial, sans-serif">&lt;EOS&gt;</text>

  <!-- Arrows from transformer to target -->
  <line x1="300" y1="220" x2="300" y2="262" stroke="#e74c3c" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="460" y1="220" x2="420" y2="262" stroke="#e74c3c" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Attention visualization hint -->
  <text x="640" y="113" font-size="11" fill="#e74c3c" font-family="Arial, sans-serif">注意力权重</text>
  <text x="640" y="130" font-size="11" fill="#e74c3c" font-family="Arial, sans-serif">连接相关词</text>
  <!-- Attention arc from "猫" to "cat" -->
  <path d="M 190 262 Q 190 200 190 126" stroke="#e74c3c" stroke-width="1.5" fill="none" stroke-dasharray="4,3" opacity="0.6"/>
  <path d="M 100 262 Q 100 200 100 126" stroke="#e74c3c" stroke-width="1.5" fill="none" stroke-dasharray="4,3" opacity="0.6"/>
</svg>
