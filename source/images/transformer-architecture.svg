<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 900" width="800" height="900">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#00000022"/>
    </filter>
  </defs>
  <rect width="800" height="900" fill="#f8f9fa" rx="12"/>
  <text x="400" y="40" text-anchor="middle" font-size="22" font-weight="bold" fill="#2c3e50" font-family="Arial, sans-serif">Transformer 整体架构</text>

  <!-- Encoder Block -->
  <rect x="60" y="70" width="300" height="700" rx="16" fill="#e8f4fd" stroke="#3498db" stroke-width="2" filter="url(#shadow)"/>
  <text x="210" y="100" text-anchor="middle" font-size="16" font-weight="bold" fill="#2980b9" font-family="Arial, sans-serif">编码器 (Encoder)</text>

  <!-- Encoder Input Embedding -->
  <rect x="90" y="680" width="240" height="44" rx="8" fill="#3498db" filter="url(#shadow)"/>
  <text x="210" y="707" text-anchor="middle" font-size="13" fill="white" font-family="Arial, sans-serif">输入嵌入 (Input Embedding)</text>

  <!-- Encoder Positional Encoding -->
  <rect x="90" y="620" width="240" height="44" rx="8" fill="#5dade2" filter="url(#shadow)"/>
  <text x="210" y="647" text-anchor="middle" font-size="13" fill="white" font-family="Arial, sans-serif">位置编码 (Positional Encoding)</text>

  <!-- Encoder Layer (×N) -->
  <rect x="80" y="130" width="260" height="460" rx="12" fill="#d6eaf8" stroke="#2980b9" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="210" y="158" text-anchor="middle" font-size="12" fill="#2980b9" font-family="Arial, sans-serif">× N 层</text>

  <!-- Multi-Head Attention (Encoder) -->
  <rect x="100" y="420" width="220" height="50" rx="8" fill="#2ecc71" filter="url(#shadow)"/>
  <text x="210" y="450" text-anchor="middle" font-size="13" fill="white" font-family="Arial, sans-serif">多头自注意力</text>

  <!-- Add & Norm 1 (Encoder) -->
  <rect x="100" y="360" width="220" height="40" rx="8" fill="#f39c12" filter="url(#shadow)"/>
  <text x="210" y="385" text-anchor="middle" font-size="13" fill="white" font-family="Arial, sans-serif">Add &amp; Norm</text>

  <!-- Feed Forward (Encoder) -->
  <rect x="100" y="290" width="220" height="50" rx="8" fill="#9b59b6" filter="url(#shadow)"/>
  <text x="210" y="320" text-anchor="middle" font-size="13" fill="white" font-family="Arial, sans-serif">前馈神经网络 (FFN)</text>

  <!-- Add & Norm 2 (Encoder) -->
  <rect x="100" y="230" width="220" height="40" rx="8" fill="#f39c12" filter="url(#shadow)"/>
  <text x="210" y="255" text-anchor="middle" font-size="13" fill="white" font-family="Arial, sans-serif">Add &amp; Norm</text>

  <!-- Encoder arrows -->
  <line x1="210" y1="724" x2="210" y2="664" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="210" y1="620" x2="210" y2="474" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="210" y1="420" x2="210" y2="404" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="210" y1="360" x2="210" y2="344" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="210" y1="290" x2="210" y2="274" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="210" y1="230" x2="210" y2="180" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Encoder Output label -->
  <text x="210" y="175" text-anchor="middle" font-size="11" fill="#2980b9" font-family="Arial, sans-serif">编码器输出 →</text>

  <!-- Decoder Block -->
  <rect x="440" y="70" width="300" height="700" rx="16" fill="#fef9e7" stroke="#e67e22" stroke-width="2" filter="url(#shadow)"/>
  <text x="590" y="100" text-anchor="middle" font-size="16" font-weight="bold" fill="#d35400" font-family="Arial, sans-serif">解码器 (Decoder)</text>

  <!-- Decoder Input Embedding -->
  <rect x="470" y="680" width="240" height="44" rx="8" fill="#e67e22" filter="url(#shadow)"/>
  <text x="590" y="707" text-anchor="middle" font-size="13" fill="white" font-family="Arial, sans-serif">输出嵌入 (Output Embedding)</text>

  <!-- Decoder Positional Encoding -->
  <rect x="470" y="620" width="240" height="44" rx="8" fill="#f0a500" filter="url(#shadow)"/>
  <text x="590" y="647" text-anchor="middle" font-size="13" fill="white" font-family="Arial, sans-serif">位置编码 (Positional Encoding)</text>

  <!-- Decoder Layer (×N) -->
  <rect x="460" y="130" width="260" height="460" rx="12" fill="#fdebd0" stroke="#e67e22" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="590" y="158" text-anchor="middle" font-size="12" fill="#d35400" font-family="Arial, sans-serif">× N 层</text>

  <!-- Masked Multi-Head Attention (Decoder) -->
  <rect x="480" y="490" width="220" height="50" rx="8" fill="#e74c3c" filter="url(#shadow)"/>
  <text x="590" y="515" text-anchor="middle" font-size="12" fill="white" font-family="Arial, sans-serif">掩码多头自注意力</text>
  <text x="590" y="530" text-anchor="middle" font-size="10" fill="#ffe" font-family="Arial, sans-serif">(Masked)</text>

  <!-- Add & Norm 1 (Decoder) -->
  <rect x="480" y="430" width="220" height="40" rx="8" fill="#f39c12" filter="url(#shadow)"/>
  <text x="590" y="455" text-anchor="middle" font-size="13" fill="white" font-family="Arial, sans-serif">Add &amp; Norm</text>

  <!-- Cross-Attention (Decoder) -->
  <rect x="480" y="360" width="220" height="50" rx="8" fill="#1abc9c" filter="url(#shadow)"/>
  <text x="590" y="385" text-anchor="middle" font-size="12" fill="white" font-family="Arial, sans-serif">交叉注意力</text>
  <text x="590" y="400" text-anchor="middle" font-size="10" fill="#e0fff8" font-family="Arial, sans-serif">(Cross-Attention)</text>

  <!-- Add & Norm 2 (Decoder) -->
  <rect x="480" y="300" width="220" height="40" rx="8" fill="#f39c12" filter="url(#shadow)"/>
  <text x="590" y="325" text-anchor="middle" font-size="13" fill="white" font-family="Arial, sans-serif">Add &amp; Norm</text>

  <!-- Feed Forward (Decoder) -->
  <rect x="480" y="230" width="220" height="50" rx="8" fill="#9b59b6" filter="url(#shadow)"/>
  <text x="590" y="260" text-anchor="middle" font-size="13" fill="white" font-family="Arial, sans-serif">前馈神经网络 (FFN)</text>

  <!-- Add & Norm 3 (Decoder) -->
  <rect x="480" y="170" width="220" height="40" rx="8" fill="#f39c12" filter="url(#shadow)"/>
  <text x="590" y="195" text-anchor="middle" font-size="13" fill="white" font-family="Arial, sans-serif">Add &amp; Norm</text>

  <!-- Decoder arrows -->
  <line x1="590" y1="724" x2="590" y2="664" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="590" y1="620" x2="590" y2="544" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="590" y1="490" x2="590" y2="474" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="590" y1="430" x2="590" y2="414" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="590" y1="360" x2="590" y2="344" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="590" y1="300" x2="590" y2="284" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="590" y1="230" x2="590" y2="214" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Cross-attention connection from encoder to decoder -->
  <path d="M 340 165 Q 410 385 480 385" stroke="#1abc9c" stroke-width="2" fill="none" stroke-dasharray="5,3" marker-end="url(#arrow)"/>
  <text x="390" y="310" text-anchor="middle" font-size="10" fill="#1abc9c" font-family="Arial, sans-serif" transform="rotate(-70, 390, 310)">K, V 来自编码器</text>

  <!-- Output section -->
  <rect x="490" y="800" width="200" height="40" rx="8" fill="#c0392b" filter="url(#shadow)"/>
  <text x="590" y="825" text-anchor="middle" font-size="13" fill="white" font-family="Arial, sans-serif">Linear + Softmax</text>
  <line x1="590" y1="170" x2="590" y2="844" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Output Probabilities -->
  <rect x="510" y="855" width="160" height="34" rx="8" fill="#922b21"/>
  <text x="590" y="877" text-anchor="middle" font-size="12" fill="white" font-family="Arial, sans-serif">输出概率分布</text>
  <line x1="590" y1="840" x2="590" y2="855" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
</svg>
