<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 520" width="700" height="520">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#00000022"/>
    </filter>
  </defs>
  <rect width="700" height="520" fill="#f8f9fa" rx="12"/>
  <text x="350" y="36" text-anchor="middle" font-size="20" font-weight="bold" fill="#2c3e50" font-family="Arial, sans-serif">编码器单层结构 (Encoder Layer)</text>

  <!-- Input -->
  <rect x="250" y="60" width="200" height="40" rx="8" fill="#2c3e50" filter="url(#shadow)"/>
  <text x="350" y="85" text-anchor="middle" font-size="13" fill="white" font-family="Arial, sans-serif">输入 x (词嵌入 + 位置编码)</text>

  <!-- Multi-Head Self-Attention -->
  <rect x="200" y="150" width="300" height="60" rx="10" fill="#2ecc71" filter="url(#shadow)"/>
  <text x="350" y="175" text-anchor="middle" font-size="14" fill="white" font-family="Arial, sans-serif">多头自注意力</text>
  <text x="350" y="198" text-anchor="middle" font-size="11" fill="#e8f8f5" font-family="Arial, sans-serif">Multi-Head Self-Attention</text>

  <!-- Add & Norm 1 -->
  <rect x="200" y="260" width="300" height="50" rx="10" fill="#f39c12" filter="url(#shadow)"/>
  <text x="350" y="285" text-anchor="middle" font-size="14" fill="white" font-family="Arial, sans-serif">Add &amp; LayerNorm</text>
  <text x="350" y="302" text-anchor="middle" font-size="11" fill="#fef9e7" font-family="Arial, sans-serif">残差连接 + 层归一化</text>

  <!-- Feed Forward -->
  <rect x="200" y="360" width="300" height="60" rx="10" fill="#9b59b6" filter="url(#shadow)"/>
  <text x="350" y="385" text-anchor="middle" font-size="14" fill="white" font-family="Arial, sans-serif">前馈神经网络</text>
  <text x="350" y="405" text-anchor="middle" font-size="11" fill="#f5eef8" font-family="Arial, sans-serif">FFN(x) = max(0, xW₁+b₁)W₂+b₂</text>

  <!-- Add & Norm 2 -->
  <rect x="200" y="470" width="300" height="40" rx="10" fill="#f39c12" filter="url(#shadow)"/>
  <text x="350" y="495" text-anchor="middle" font-size="14" fill="white" font-family="Arial, sans-serif">Add &amp; LayerNorm</text>

  <!-- Arrows main flow -->
  <line x1="350" y1="100" x2="350" y2="150" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="350" y1="210" x2="350" y2="260" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="350" y1="310" x2="350" y2="360" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="350" y1="420" x2="350" y2="470" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Residual connection 1 -->
  <path d="M 200 80 L 140 80 L 140 285 L 200 285" stroke="#e74c3c" stroke-width="2" fill="none" stroke-dasharray="6,3" marker-end="url(#arrow)"/>
  <text x="110" y="185" text-anchor="middle" font-size="11" fill="#e74c3c" font-family="Arial, sans-serif" transform="rotate(-90,110,185)">残差连接</text>

  <!-- Residual connection 2 -->
  <path d="M 500 285 L 560 285 L 560 490 L 500 490" stroke="#e74c3c" stroke-width="2" fill="none" stroke-dasharray="6,3" marker-end="url(#arrow)"/>
  <text x="590" y="390" text-anchor="middle" font-size="11" fill="#e74c3c" font-family="Arial, sans-serif" transform="rotate(90,590,390)">残差连接</text>

  <!-- Annotation: Q=K=V=x for self-attention -->
  <rect x="520" y="155" width="160" height="50" rx="8" fill="#eaf2ff" stroke="#3498db" stroke-width="1"/>
  <text x="600" y="175" text-anchor="middle" font-size="11" fill="#2980b9" font-family="Arial, sans-serif">自注意力：</text>
  <text x="600" y="195" text-anchor="middle" font-size="11" fill="#2980b9" font-family="Arial, sans-serif">Q = K = V = x</text>
  <line x1="500" y1="180" x2="520" y2="180" stroke="#3498db" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Annotation: FFN -->
  <rect x="520" y="365" width="160" height="50" rx="8" fill="#f5eef8" stroke="#9b59b6" stroke-width="1"/>
  <text x="600" y="385" text-anchor="middle" font-size="11" fill="#8e44ad" font-family="Arial, sans-serif">两层全连接网络</text>
  <text x="600" y="403" text-anchor="middle" font-size="11" fill="#8e44ad" font-family="Arial, sans-serif">中间维度 = 4×dmodel</text>
  <line x1="500" y1="390" x2="520" y2="390" stroke="#9b59b6" stroke-width="1" stroke-dasharray="3,2"/>
</svg>
